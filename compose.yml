services:
  openldap:
    image: osixia/openldap:latest
    container_name: openldap-server
    restart: always
    ports:
      - "389:389"
      - "636:636"
    environment:
      - LDAP_ORGANISATION=LEONI
      - LDAP_DOMAIN=leoni.local
      - LDAP_ADMIN_PASSWORD=adminpassword
      - LDAP_TLS=false
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

volumes:
  ldap_data:
  ldap_config: